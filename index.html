<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Bank</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="container">

    <div class="hero">
      <div class="star">★</div>
      <h1>ASTRO</h1>
      <p class="subtitle">Banca de élite para el futuro</p>

      <div class="buttons">
        <button class="btn primary">Iniciar Sesión</button>
        <button class="btn outline">Registrarse</button>
      </div>
    </div>

    <section class="features">
      <div class="card">
        <h3>Seguridad Premium</h3>
        <p>Protección de nivel bancario para tus activos</p>
      </div>

      <div class="card">
        <h3>Gestión Inteligente</h3>
        <p>Administra tus finanzas con tecnología avanzada</p>
      </div>

      <div class="card">
        <h3>Soporte 24/7</h3>
        <p>Asistencia exclusiva cuando lo necesites</p>
      </div>
    </section>

  </main>

</body>
</html>
