<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consignar Dinero - ASTRO</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/consignar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script type="importmap">
        {
            "imports": {
                "@google/generative-ai": "https://unpkg.com/@google/generative-ai?module"
            }
        }
        </script>
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-logo"><i class="fas fa-star"></i> ASTRO</div>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="perfil.html"><i class="far fa-user-circle"></i> Mi Perfil</a>
            <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="transfer-wrapper">
            <a href="dashboard.html" class="back-link">← Volver al Panel</a>

            <header class="dashboard-header" style="text-align: center;">
                <h1 class="text-gold"><i class="fas fa-plus-circle"></i> Consignar Dinero</h1>
                <p class="subtitle">Deposita dinero en tu cuenta de forma segura</p>
            </header>

            <div class="auth-card">
                <form id="consignarForm">
                    <div class="input-group">
                        <label>Seleccionar Cuenta</label>
                        <select id="cuentaSelect" class="dark-input select-custom" required>
                            <option value="">Seleccione una cuenta...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Monto a Consignar</label>
                        <div class="input-wrapper">
                            <i class="fas fa-dollar-sign"></i>
                            <input type="number" id="monto" placeholder="0.00" min="0" step="0.01" class="dark-input" required>
                        </div>
                    </div>

                    <div id="cuentaInfo" class="cuenta-info" style="display: none;">
                        <div class="balance-display">
                            <span class="label">Cuenta seleccionada:</span>
                            <span class="amount" id="cuentaSeleccionada">-</span>
                        </div>
                        <div class="balance-display">
                            <span class="label">Saldo Actual:</span>
                            <span class="amount" id="saldoActual">$0.00</span>
                        </div>
                    </div>

                    <button type="submit" class="btn primary">
                        <i class="fas fa-plus-circle"></i> Consignar Dinero
                    </button>
                </form>

                <div id="message" class="message" style="display: none;"></div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
      <div class="footer-content">
        <div class="footer-logo"><i class="fas fa-star"></i> ASTRO</div>
        <p class="copyright">
          © 2026 ASTRO Bank. Todos los derechos reservados.
        </p>
        <div class="footer-links">
          <a href="privacidad.html">Privacidad</a>
          <a href="términos.html">Términos</a>
          <a href="contacto.html">Contacto</a>
        </div>
      </div>
    </footer>

    <script type="module" src="../js/pages/consignar.js"></script>
        <!-- Chat flotante ASTRO -->
        <button id="chat-toggle-button" class="chat-toggle-button" type="button">
            <i class="fas fa-comments"></i>
            Chat ASTRO
        </button>

        <div id="chat-panel" class="chat-panel" aria-hidden="true">
            <header class="chat-header">
                <div>
                    <div class="chat-title">ASTRO Asistente</div>
                    <div class="chat-subtitle">Chat bancario inteligente</div>
                </div>
                <button id="chat-close-button" class="chat-close-button" type="button" aria-label="Cerrar chat">&times;</button>
            </header>

            <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>

            <form id="chat-form" class="chat-form">
                <input id="chat-input" class="chat-input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off" />
                <button class="chat-send-button" type="submit">Enviar</button>
            </form>
        </div>

        <script type="module" src="../js/chatbot.js"></script>
</body>
</html>
