<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Banca del Futuro</title>
     <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script type="importmap">
        {
            "imports": {
                "@google/generative-ai": "https://unpkg.com/@google/generative-ai?module"
            }
        }
        </script>
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="star-header">
            <i class="fas fa-star"></i>
        </div>

        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <p class="subtitle">Únete a la banca del futuro</p>
            <br>
            <form id="registerForm">
                <div id="registerMessage" class="form-message"></div>
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" name="nombre" id="nombre" placeholder="Tu nombre" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Identificación</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="identificacion" id="identificacion" placeholder="Número de identificación" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-check"></i>
                        <input type="text" name="usuario" id="usuario" placeholder="Nombre de usuario" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" name="email" id="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Teléfono</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <input type="tel" name="telefono" id="telefono" placeholder="+57 600 000 0000">
                    </div>
                </div>

                <div class="input-group">
                    <label>Fecha de Nacimiento</label>
                    <div class="input-wrapper">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" name="fechaNacimiento" id="fechaNacimiento" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn primary btn-crear">Crear Cuenta</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
                <a href="../index.html" class="back-link">← Volver al inicio</a>
            </div>
        </div>
    </div>
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo"><i class="fas fa-star"></i> ASTRO</div>
            <p class="copyright">
                © 2026 ASTRO Bank. Todos los derechos reservados.
            </p>
            <div class="footer-links">
                <a href="privacidad.html">Privacidad</a>
                <a href="términos.html">Términos</a>
                <a href="contacto.html">Contacto</a>
            </div>
        </div>
    </footer>
    <script type="module" src="../js/pages/register-usuario.js"></script>
        <!-- Chat flotante ASTRO -->
        <button id="chat-toggle-button" class="chat-toggle-button" type="button">
            <i class="fas fa-comments"></i>
            Chat ASTRO
        </button>

        <div id="chat-panel" class="chat-panel" aria-hidden="true">
            <header class="chat-header">
                <div>
                    <div class="chat-title">ASTRO Asistente</div>
                    <div class="chat-subtitle">Chat bancario inteligente</div>
                </div>
                <button id="chat-close-button" class="chat-close-button" type="button" aria-label="Cerrar chat">&times;</button>
            </header>

            <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>

            <form id="chat-form" class="chat-form">
                <input id="chat-input" class="chat-input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off" />
                <button class="chat-send-button" type="submit">Enviar</button>
            </form>
        </div>

        <script type="module" src="../js/chatbot.js"></script>
</body>
</html>
