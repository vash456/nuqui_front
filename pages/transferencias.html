<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferencias - ASTRO</title>
     <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-logo"><i class="fas fa-star"></i> ASTRO</div>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="perfil.html"><i class="far fa-user-circle"></i> Mi Perfil</a>
            <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="transfer-wrapper">
            <a href="dashboard.html" class="back-link">← Volver al Panel</a>
            
            <header class="dashboard-header" style="text-align: center;">
                <h1 class="text-gold">Transferencias</h1>
                <p class="subtitle">Envía dinero de forma segura</p>
            </header>

            <div class="auth-card">
                <form id="transferForm">
                    <div class="input-group">
                        <label>Desde mi cuenta</label>
                        <select id="origenSelect" class="dark-input select-custom" required>
                            <option value="">Selecciona una cuenta o tarjeta</option>
                        </select>
                    </div>

                    <div id="origenInfo" class="info-box" style="display:none; margin-bottom: 1rem;">
                        <p><strong id="origenSeleccionado"></strong></p>
                        <p id="saldoOrigen"></p>
                        <p id="detalleOrigen"></p>
                    </div>

                    <div class="input-group">
                        <label>Beneficiario</label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input id="beneficiario" type="text" placeholder="Nombre del destinatario" class="dark-input" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Número de Cuenta / Tarjeta Destino</label>
                        <div class="input-wrapper">
                            <i class="fas fa-hashtag"></i>
                            <input id="destinoCuenta" type="text" placeholder="# XX-0000000000000-000" class="dark-input" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Cantidad</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-dollar-sign"></i>
                            <input id="monto" type="number" step="0.01" placeholder="0.00" class="dark-input" required>
                            <span class="currency-tag">COP</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Concepto (Opcional)</label>
                        <div class="input-wrapper" style="align-items: flex-start; position: relative;">
                            <i class="far fa-comment-alt" style="top: 15px;"></i>
                            <textarea id="descripcion" placeholder="&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Descripción de la transferencia" class="dark-input" rows="3" style="padding-top: 12px; resize: none;"></textarea>
                        </div>
                    </div>

                    <div id="message" class="form-message" style="display:none; margin-bottom: 1rem;"></div>

                    <button type="submit" class="btn primary full-width">
                        <i class="fas fa-paper-plane"></i> Realizar Transferencia
                    </button>
                </form>

                
                    <div class="info-note-box">
                        <p><strong>Nota:</strong> Todas las transferencias están protegidas con encriptación de nivel bancario </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo"><i class="fas fa-star"></i> ASTRO</div>
            <p class="copyright">© 2026 ASTRO Bank. Todos los derechos reservados.</p>
            <div class="footer-links">
                <a href="privacidad.html">Privacidad</a> <a href="términos.html">Términos</a> <a href="contacto.html">Contacto</a>
            </div>
        </div>
    </footer>

    <script type="module" src="../js/pages/transferencias.js"></script>
</body>
</html>
