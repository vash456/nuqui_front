<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ASTRO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="star-header">
            <i class="fas fa-star"></i>
        </div>

        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Accede a tu cuenta ASTRO</p>
            <br>
            <form id="loginForm">
                <div id="loginMessage" class="form-message"></div>
                <div class="input-group">
                    <label>Usuario o Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="text" name="identifier" id="identifier" placeholder="Usuario o Correo" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn primary">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="registro-usuario.html">Regístrate aquí</a></p>
                <a href="../index.html" class="back-link">← Volver al inicio</a>
            </div>
        </div>
    </div>
    <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
