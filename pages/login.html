<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ASTRO</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png"> 
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script type="importmap">
        {
            "imports": {
                "@google/generative-ai": "https://unpkg.com/@google/generative-ai?module"
            }
        }
        </script>
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="star-header">
            <i class="fas fa-star"></i>
        </div>

        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Accede a tu cuenta ASTRO</p>
            <br>
            <form id="loginForm">
                <div id="loginMessage" class="form-message"></div>
                <div class="input-group">
                    <label>Usuario o Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="text" name="identifier" id="identifier" placeholder="Usuario o Correo" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn primary btn-entrar">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="registro-usuario.html">Regístrate aquí</a></p>
                <a href="../index.html" class="back-link">← Volver al inicio</a>
            </div>
        </div>
    </div>
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo"><i class="fas fa-star"></i> ASTRO</div>
            <p class="copyright">
                © 2026 ASTRO Bank. Todos los derechos reservados.
            </p>
            <div class="footer-links">
                <a href="privacidad.html">Privacidad</a>
                <a href="términos.html">Términos</a>
                <a href="contacto.html">Contacto</a>
            </div>
        </div>
    </footer>
    <script type="module" src="../js/pages/login.js"></script>
        <!-- Chat flotante ASTRO -->
        <button id="chat-toggle-button" class="chat-toggle-button" type="button">
            <i class="fas fa-comments"></i>
            Chat ASTRO
        </button>

        <div id="chat-panel" class="chat-panel" aria-hidden="true">
            <header class="chat-header">
                <div>
                    <div class="chat-title">ASTRO Asistente</div>
                    <div class="chat-subtitle">Chat bancario inteligente</div>
                </div>
                <button id="chat-close-button" class="chat-close-button" type="button" aria-label="Cerrar chat">&times;</button>
            </header>

            <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>

            <form id="chat-form" class="chat-form">
                <input id="chat-input" class="chat-input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off" />
                <button class="chat-send-button" type="submit">Enviar</button>
            </form>
        </div>

        <script type="module" src="../js/chatbot.js"></script>
</body>
</html>
